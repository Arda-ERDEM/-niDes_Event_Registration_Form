openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: registration
    description: Event registration operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /taken-teams:
    get:
      operationId: getTakenTeams
      tags: [registration]
      summary: Get taken team numbers
      description: Returns list of team numbers that are already registered
      responses:
        "200":
          description: List of taken team numbers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TakenTeamsResponse"
  /register:
    post:
      operationId: submitRegistration
      tags: [registration]
      summary: Submit team registration
      description: Submits a team registration form and sends email notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationRequest"
      responses:
        "200":
          description: Registration submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Team number already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    TakenTeamsResponse:
      type: object
      properties:
        takenTeams:
          type: array
          items:
            type: integer
          description: List of team numbers already registered
      required:
        - takenTeams
    Participant:
      type: object
      properties:
        tcKimlik:
          type: string
          description: TC Kimlik No (11 digits)
        isimSoyisim:
          type: string
          description: Full name
        gelinenYer:
          type: string
          description: City/place of origin
        telefon:
          type: string
          description: Phone number
        email:
          type: string
          description: Email address
        isKaptan:
          type: boolean
          description: Whether this participant is the team captain
        universite:
          type: string
          description: University name
        bolum:
          type: string
          description: Department/faculty
      required:
        - tcKimlik
        - isimSoyisim
        - gelinenYer
        - telefon
        - email
        - isKaptan
        - universite
        - bolum
    RegistrationRequest:
      type: object
      properties:
        takimAdi:
          type: string
          description: Team name
        takimNumarasi:
          type: integer
          description: Team number (1-15)
        katilimcilar:
          type: array
          items:
            $ref: "#/components/schemas/Participant"
          description: List of participants (2-4)
      required:
        - takimAdi
        - takimNumarasi
        - katilimcilar
    RegistrationResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
